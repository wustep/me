<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f0ede8"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="imageShadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  
  <!-- Background - warm paper texture -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle radial glow -->
  <ellipse cx="600" cy="340" rx="500" ry="280" fill="#c8c3b9" opacity="0.08"/>
  
  <!-- The word "DOMino" with letters displaced by the thrown element -->
  
  <!-- "D" - pushed left and rotated -->
  <g transform="translate(165, 360) rotate(-8)" filter="url(#textShadow)">
    <text font-family="'Source Serif 4', Georgia, serif" font-size="180" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">D</text>
  </g>
  
  <!-- "O" - tilted and dropping -->
  <g transform="translate(290, 380) rotate(12)" filter="url(#textShadow)">
    <text font-family="'Source Serif 4', Georgia, serif" font-size="180" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">O</text>
  </g>
  
  <!-- "M" - being hit, flying up and rotating -->
  <g transform="translate(445, 290) rotate(-25)" filter="url(#textShadow)">
    <text font-family="'Source Serif 4', Georgia, serif" font-size="180" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">M</text>
  </g>
  
  <!-- "i" - tumbling -->
  <g transform="translate(710, 410) rotate(35)" filter="url(#textShadow)">
    <text font-family="'Source Serif 4', Georgia, serif" font-size="180" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">i</text>
  </g>
  
  <!-- "n" - pushed right -->
  <g transform="translate(810, 365) rotate(5)" filter="url(#textShadow)">
    <text font-family="'Source Serif 4', Georgia, serif" font-size="180" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">n</text>
  </g>
  
  <!-- "o" - flying off -->
  <g transform="translate(970, 330) rotate(-15)" filter="url(#textShadow)">
    <text font-family="'Source Serif 4', Georgia, serif" font-size="180" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">o</text>
  </g>
  
  <!-- The thrown element - a clean image card crashing through -->
  <g transform="translate(610, 365) rotate(12)" filter="url(#imageShadow)">
    <!-- Card base -->
    <rect x="-60" y="-80" width="120" height="160" rx="8" fill="#fff"/>
    
    <!-- Image area with landscape -->
    <rect x="-52" y="-72" width="104" height="104" rx="4" fill="#dbeafe"/>
    
    <!-- Sun -->
    <circle cx="-20" cy="-42" r="14" fill="#fbbf24"/>
    
    <!-- Mountains -->
    <path d="M-52 32 L-10 -20 L30 32 L-52 32Z" fill="#3b82f6" opacity="0.6"/>
    <path d="M-20 32 L25 -30 L52 32 L-20 32Z" fill="#2563eb" opacity="0.8"/>
    
    <!-- Caption placeholder lines -->
    <rect x="-44" y="44" width="70" height="6" rx="3" fill="#e5e5e5"/>
    <rect x="-44" y="58" width="50" height="6" rx="3" fill="#eeeeee"/>
  </g>
  
  <!-- Motion lines behind the thrown element -->
  <g opacity="0.18" stroke="#444" stroke-width="2" stroke-linecap="round">
    <line x1="475" y1="375" x2="515" y2="360"/>
    <line x1="485" y1="395" x2="525" y2="378" opacity="0.6"/>
    <line x1="490" y1="350" x2="520" y2="340" opacity="0.4"/>
  </g>
</svg>
