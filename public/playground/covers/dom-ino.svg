<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle radial glow from top -->
  <ellipse cx="600" cy="-50" rx="700" ry="400" fill="white" opacity="0.04"/>
  
  <!-- DOMino text centered -->
  <g transform="translate(600, 340)">
    <!-- "DOM" -->
    <text 
      x="-155" 
      y="0" 
      font-family="'Crimson Pro', Georgia, serif" 
      font-size="140" 
      font-weight="700" 
      fill="#ffffff"
      letter-spacing="-0.03em"
      text-anchor="end"
    >DOM</text>
    
    <!-- "ino" block -->
    <g transform="translate(-5, -45) rotate(2)">
      <rect 
        x="0" 
        y="0" 
        width="175" 
        height="90" 
        rx="8" 
        fill="#ffffff"
      />
      <text 
        x="87" 
        y="70" 
        font-family="'Crimson Pro', Georgia, serif" 
        font-size="80" 
        font-weight="700" 
        fill="#0d0d0d"
        letter-spacing="-0.03em"
        text-anchor="middle"
      >ino</text>
    </g>
  </g>
</svg>
